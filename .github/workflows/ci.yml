name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install core dependencies
        run: npm install
        working-directory: packages/core

      - name: Install ui dependencies
        run: npm install
        working-directory: packages/ui

      - name: Install adapters dependencies
        run: npm install
        working-directory: packages/adapters

      - name: Type check core
        run: npx tsc --noEmit
        working-directory: packages/core

      - name: Type check ui
        run: npx tsc --noEmit
        working-directory: packages/ui

      - name: Type check adapters
        run: npx tsc --noEmit
        working-directory: packages/adapters

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build core
        working-directory: packages/core
        run: |
          npm install
          npm run build

      - name: Install and build ui
        working-directory: packages/ui
        run: |
          npm install
          npm run build

      - name: Install and build adapters
        working-directory: packages/adapters
        run: |
          npm install
          npm run build
